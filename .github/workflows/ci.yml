name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-checks:
    name: Repository quality gates
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ysabellestore_ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint repository
        run: npm run lint

      - name: Build repository
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Validate Prisma schema
        run: npx prisma validate --schema=database/prisma/schema.prisma

  workspace-validation:
    name: Workspace validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - frontend
          - backend
          - electron
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: npm run build --workspace ${{ matrix.workspace }}

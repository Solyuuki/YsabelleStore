name: Repository Governance

on:
  pull_request:
    branches:
      - main
      - staging
      - "sprint/**"

permissions:
  contents: read

jobs:
  branch-name:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch format
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          member_pattern='^(m1|m2|m3)/v[0-9]+\.[0-9]+/(feat|fix|docs|refactor|test|chore)/[a-z0-9]+(-[a-z0-9]+)*$'
          sprint_pattern='^sprint/v[0-9]+\.[0-9]+/sprint-[0-9]+$'
          staging_pattern='^staging$'
          if [[ ! "$BRANCH_NAME" =~ $member_pattern && ! "$BRANCH_NAME" =~ $sprint_pattern && ! "$BRANCH_NAME" =~ $staging_pattern ]]; then
            echo "Invalid branch name: $BRANCH_NAME"
            echo "Expected one of:"
            echo "- member/version/type/task-name"
            echo "- sprint/version/sprint-number"
            echo "- staging"
            echo "Examples:"
            echo "- m1/v0.1/feat/frontend-app-shell"
            echo "- sprint/v0.1/sprint-1"
            echo "- staging"
            exit 1
          fi

  markdown-foundation:
    name: Validate documentation foundation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          required_files=(
            "README.md"
            "docs/GITHUB-WORKFLOW.md"
            "docs/standards/01-big-picture.md"
            "docs/standards/02-folder-map.md"
            "docs/standards/03-folder-guide.md"
            "docs/standards/04-env.md"
            "docs/standards/05-naming-rules.md"
            "docs/standards/06-coding-standards.md"
            "docs/standards/07-member-ownership.md"
            "docs/standards/08-merge-collisions.md"
            "docs/standards/09-edge-cases.md"
            "docs/standards/CI-GUARDRAILS.md"
            "docs/standards/010-golden-rules.md"
            "docs/sprints/sprint-1/README.md"
            "docs/sprints/sprint-1/SPRINT-GOAL.md"
            "docs/sprints/sprint-1/SPRINT-BACKLOG.md"
            "docs/sprints/sprint-1/MEMBER-ASSIGNMENTS.md"
            "docs/sprints/sprint-1/BRANCH-PLAN.md"
            "docs/sprints/sprint-1/DEFINITION-OF-DONE.md"
            "docs/sprints/sprint-1/RISK-PLAN.md"
            "docs/sprints/sprint-1/DAILY-WORKFLOW.md"
            "docs/sprints/sprint-1/SPRINT-REVIEW.md"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Required file is missing or empty: $file"
              exit 1
            fi
          done

      - name: Check for unfinished markers
        run: |
          pattern="TO""DO|TB""D|PLACE""HOLDER"
          if grep -RInE "$pattern" README.md docs .github; then
            echo "Unfinished marker found."
            exit 1
          fi
